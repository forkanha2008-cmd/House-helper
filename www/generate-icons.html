<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  const grad = ctx.createLinearGradient(0,0,s,s);
  grad.addColorStop(0, '#1A6B5C');
  grad.addColorStop(1, '#124D43');
  ctx.fillStyle = grad;
  const r = s * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s-r, 0);
  ctx.quadraticCurveTo(s,0,s,r);
  ctx.lineTo(s,s-r);
  ctx.quadraticCurveTo(s,s,s-r,s);
  ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  // House emoji
  ctx.font = `${s*0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏠', s/2, s/2 + s*0.03);
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

// Download both
function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

download(c192, 'icon-192.png');
setTimeout(() => download(c512, 'icon-512.png'), 500);
</script>
</body>
</html>
